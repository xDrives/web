<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Download Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }
        .box {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        a.button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a.button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Download PDF File</h2>
    
    <!-- Download Button -->
    <a href="sample.pdf" download class="button">
        Download PDF
    </a>

    <br><br>

    <!-- View Button -->
    <a href="sample.pdf" target="_blank" class="button">
        View PDF
    </a>
</div>

</body>
</html>
