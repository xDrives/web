<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>xDrive Secure Share · Private & Encrypted</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="content-styles.css" />
</head>
<body>
    <div class="container">
        <div class="xdrive-card">
            <div class="xdrive-header">
                <div class="header-brand">
                    <i class="fa-solid fa-shield-halved"></i>
                    <h1>xDrive Secure Share</h1>
                </div>
                <div class="security-chip">
                    <i class="fa-solid fa-shield"></i>
                    <span>End-to-End Encrypted</span>
                </div>
            </div>
            <div class="xdrive-content">
                <!-- Unlock Section -->
                <div id="unlockSection">
                    <div id="openAccessMessage" style="display: none;">
                        <button id="viewOpenContentBtn" class="btn btn-primary">
                            <i class="fa-solid fa-eye"></i> View Content
                        </button>
                    </div>
                    <div id="passwordAccessMessage" style="display: none;">
                        <div class="form-group-xdrive">
                            <label class="form-label">ACCESS PASSWORD</label>
                            <input type="password" id="passwordInput" class="xdrive-input" placeholder="Enter content password" autocomplete="off" />
                        </div>
                        <button id="unlockBtn" class="btn btn-primary">
                            <i class="fa-solid fa-key"></i> Unlock Content
                        </button>
                    </div>
                    <div id="errorMessage" class="error-message-xdrive" style="display: none;"></div>
                </div>

                <!-- Content Display Section -->
                <div id="contentSection" style="display: none;">
                    <div id="contentDisplay"></div>
                    <div class="button-group" style="margin-top: 8px;">
                        <button id="shareLinkBtn" class="btn btn-secondary">
                            <i class="fa-solid fa-share-nodes"></i> Share Link
                        </button>
                        <button id="backToUnlockBtn" class="btn btn-secondary">
                            <i class="fa-solid fa-arrow-left"></i> Go Back
                        </button>
                    </div>
                </div>

                <div id="loading" class="loading-overlay" style="display: none;">
                    <div class="spinner-xdrive"></div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">Loading secure content...</div>
                </div>
            </div>
        </div>

        <!-- APK Download Footer Section -->
        <div class="apk-footer">
            <div class="apk-footer-content">
                <div class="apk-info">
                    <i class="fa-brands fa-android"></i>
                    <div class="apk-text">
                        <h4>xDrive Mobile App</h4>
                        <p>Secure sharing • End-to-end encryption • Self-destructing content</p>
                    </div>
                </div>
                <a href="#" id="apkDownloadLink" class="apk-download-btn" download>
                    <i class="fa-solid fa-download"></i> Download
                </a>
            </div>
        </div>
    </div>

    <!-- Photo Modal (xdrive styled) -->
    <div id="photoModal" class="photo-modal-xdrive">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="" />
        <div class="modal-nav">
            <button id="prevPhotoBtn"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="photoCounter" class="photo-counter"></span>
            <button id="nextPhotoBtn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="content-script.js"></script>
</body>
</html>
