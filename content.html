<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>xDrive Secure Share · Private & Encrypted</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="content-styles.css">
</head>
<body>
<div class="container">
    <div class="xdrive-card">
        <div class="xdrive-header">
            <div class="header-brand">
                <span class="material-icons">health_and_safety</span>
                <h1>xDrive Secure Share</h1>
            </div>
            <div class="security-chip">
                <span class="material-icons">shield</span>
                <span>End-to-End Encrypted</span>
            </div>
        </div>
        <div class="xdrive-content">
            <!-- Unlock Section -->
            <div id="unlockSection">
                <div id="openAccessMessage" style="display: none;">
                    <button id="viewOpenContentBtn" class="btn-xdrive btn-primary btn-full"> 
                        <span class="material-icons">visibility</span> View Content
                    </button>
                </div>
                <div id="passwordAccessMessage" style="display: none;">
                    <div class="form-group-xdrive">
                        <label class="form-label">ACCESS PASSWORD</label>
                        <input type="password" id="passwordInput" class="xdrive-input" placeholder="Enter content password" autocomplete="off">
                    </div>
                    <button id="unlockBtn" class="btn-xdrive btn-primary btn-full">
                        <span class="material-icons">vpn_key</span> Unlock Content
                    </button>
                </div>
                <div id="errorMessage" class="error-message-xdrive" style="display: none;"></div>
            </div>

            <!-- Content Display Section -->
            <div id="contentSection" style="display: none;">
                <div id="contentDisplay"></div>
                <div class="button-group" style="margin-top: 8px;">
                    <button id="shareLinkBtn" class="btn-xdrive btn-secondary">
                        <span class="material-icons">share</span> Share Link
                    </button>
                    <button id="backToUnlockBtn" class="btn-xdrive btn-secondary">
                        <span class="material-icons">arrow_back</span> Go Back
                    </button>
                </div>
            </div>

            <div id="loading" class="loading-overlay" style="display: none;">
                <div class="spinner-xdrive"></div>
                <div style="font-size: 0.75rem; color: var(--text-secondary);">Loading secure content...</div>
            </div>
        </div>
    </div>

    <!-- APK Download Footer Section -->
    <div class="apk-footer">
        <div class="apk-footer-content">
            <div class="apk-info">
                <span class="material-icons">android</span>
                <div class="apk-text">
                    <h4>xDrive Mobile App</h4>
                    <p>Secure sharing • End-to-end encryption • Self-destructing content</p>
                </div>
            </div>
            <a href="#" id="apkDownloadLink" class="apk-download-btn" download>
                <span class="material-icons">download</span> Download
            </a>
        </div>
    </div>
</div>

<!-- Photo Modal (xdrive styled) -->
<div id="photoModal" class="photo-modal-xdrive">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="" alt="">
    <div class="modal-nav">
        <button id="prevPhotoBtn">← Previous</button>
        <span id="photoCounter" class="photo-counter"></span>
        <button id="nextPhotoBtn">Next →</button>
    </div>
</div>

<script src="content-script.js"></script>
</body>
</html>
